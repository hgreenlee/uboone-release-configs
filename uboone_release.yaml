spack:

  config:
    deprecated: true

  include:

  # Toolchain defintion.
  # Defines the compiler (gcc or llvm/clang) and version.

  - git: https://github.com/art-framework-suite/art-release-configs
    tag: art-3.14.04
    paths:
    - included_yaml/gcc-12-toolchain.yaml
    - included_yaml/packages-art.yaml
    - included_yaml/specs-art.yaml

  # Packages defintions.
  # These are version and variant requirements for a package suite
  - git: https://github.com/LArSoft/larsoft-release-configs
    tag: larsoft-10.21.00
    paths:
    - included_yaml/larsoft-packages.yaml
    - included_yaml/larsoft-specs.yaml

  - git: https://github.com/NuSoftHEP/nusofthep-release-configs
    tag: nusofthep-3.22.01
    paths:
    - included_yaml/nusofthep-packages.yaml
    - included_yaml/nusofthep-specs.yaml

  - git: https://github.com/fnal-fife/fife-release-configs
    tag: 2.8.0.4
    paths:
    - included_yaml/fife_packages.yaml
    - included_yaml/fife_specs.yaml

  - git: https://github.com/hgreenlee/uboone-release-configs
    branch: main
    paths:
    - included_yaml/uboone_packages.yaml
    - included_yaml/uboone_specs.yaml

  specs:
    - $specs_art
    - $specs_nusofthep
    - $specs_larsoft
    - $fife_specs
    - $specs_uboone

  upstreams:
    cvmfs-larsoft:
      install_tree: /cvmfs/larsoft.opensciencegrid.org/spack-fnal-v1.1.1/opt/spack

  concretizer:
    unify: true
    reuse:
      from:
      - type: environment
        path: /cvmfs/larsoft.opensciencegrid.org/spack-fnal-v1.1.1/var/spack/environments/larsoft-v10_21_00-unified-cuda-python-3_11-trimmed-rc2
  view: false
  packages:
    all:
      providers:
        libc:
        - glibc
        'zlib-api:':
        - zlib
      variants:
      - generator=ninja
      - build_type=Release
      - cxxstd=17
      target:
      - x86_64_v3
    python:
      require:
      - "@:3.11"
    cuda:
      require:
      - "@12.6"
    geant4:
      require:
      - build_type=RelWithDebInfo
      - generator=ninja
      - cxxstd=17
    grpc:
      require:
      - build_type=RelWithDebInfo
      - generator=ninja
      - cxxstd=17
    py-tensorflow:
      require:
      - +cuda
      - cuda_arch=80
    py-torch:
      require:
      - +cuda
      - cuda_arch=80
    r-m-dd-config:
      require:
      - experiment=dune
    root:
      require:
      - +xrootd
    nusystematics:
      require:
      - "@1"
    systematicstools:
      require:
      - "@1"
    trace:
      require:
      - "@:v3_23_00"
